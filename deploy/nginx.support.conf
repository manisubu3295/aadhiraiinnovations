# Reverse proxy for support.aadhiraiinnovations.com -> the Node/PM2 process (server.js).
#
# Setup on the server (Ubuntu/Debian shown):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp deploy/nginx.support.conf /etc/nginx/sites-available/support.aadhiraiinnovations.com
#   sudo ln -s /etc/nginx/sites-available/support.aadhiraiinnovations.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d support.aadhiraiinnovations.com   # obtains the cert and rewrites this file to add the SSL server block + HTTP->HTTPS redirect
#
# Point the DNS A record for support.aadhiraiinnovations.com at this server's IP before running certbot.

server {
    listen 80;
    listen [::]:80;
    server_name support.aadhiraiinnovations.com;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ticket attachments allow up to 5 files x 15MB each (see server/routes/tickets.js and
    # server/routes/client.js) — keep this at or above that so nginx isn't the tighter limit.
    client_max_body_size 80m;
}
